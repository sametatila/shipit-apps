name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "App to deploy (e.g., web, kebapci-ali)"
        required: true
        default: "web"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ inputs.app_name }}:latest
          build-args: |
            APP_NAME=${{ inputs.app_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/${{ inputs.app_name }}:latest
            docker stop ${{ inputs.app_name }} || true
            docker rm ${{ inputs.app_name }} || true
            docker run -d \
              --name ${{ inputs.app_name }} \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /opt/shipit/${{ inputs.app_name }}/.env \
              ghcr.io/${{ github.repository }}/${{ inputs.app_name }}:latest

      - name: Health check
        run: |
          echo "Waiting for deployment to start..."
          sleep 15
          echo "Deployment triggered for ${{ inputs.app_name }}"
