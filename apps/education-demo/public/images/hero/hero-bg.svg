<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002d6b"/>
      <stop offset="50%" style="stop-color:#004aad"/>
      <stop offset="100%" style="stop-color:#1a3a6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fdcb00;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#fdcb00;stop-opacity:0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="800" fill="url(#bg)"/>
  <rect width="1920" height="800" fill="url(#dots)"/>

  <!-- Accent glow -->
  <ellipse cx="1400" cy="300" rx="600" ry="400" fill="url(#accent)"/>

  <!-- Abstract university buildings silhouette -->
  <g fill="rgba(255,255,255,0.06)">
    <!-- Building 1 - tall tower -->
    <rect x="1100" y="350" width="80" height="450" rx="2"/>
    <rect x="1090" y="340" width="100" height="20" rx="2"/>
    <rect x="1120" y="300" width="40" height="50" rx="2"/>
    <rect x="1130" y="280" width="20" height="30" rx="1"/>

    <!-- Building 2 - wide hall -->
    <rect x="1200" y="450" width="200" height="350" rx="2"/>
    <rect x="1180" y="440" width="240" height="20" rx="2"/>
    <!-- Columns -->
    <rect x="1220" y="470" width="12" height="100"/>
    <rect x="1260" y="470" width="12" height="100"/>
    <rect x="1300" y="470" width="12" height="100"/>
    <rect x="1340" y="470" width="12" height="100"/>
    <rect x="1380" y="470" width="12" height="100"/>

    <!-- Building 3 -->
    <rect x="1420" y="500" width="120" height="300" rx="2"/>
    <rect x="1410" y="490" width="140" height="15" rx="2"/>
    <!-- Windows -->
    <rect x="1440" y="520" width="20" height="25" rx="1" fill="rgba(253,203,0,0.1)"/>
    <rect x="1480" y="520" width="20" height="25" rx="1" fill="rgba(253,203,0,0.1)"/>
    <rect x="1440" y="560" width="20" height="25" rx="1" fill="rgba(253,203,0,0.1)"/>
    <rect x="1480" y="560" width="20" height="25" rx="1" fill="rgba(253,203,0,0.1)"/>

    <!-- Building 4 - dome -->
    <rect x="1560" y="520" width="160" height="280" rx="2"/>
    <ellipse cx="1640" cy="520" rx="60" ry="40"/>
    <rect x="1630" y="475" width="20" height="50"/>
  </g>

  <!-- Graduation cap icon -->
  <g transform="translate(1600, 200)" fill="rgba(253,203,0,0.12)">
    <polygon points="0,-30 60,0 0,30 -60,0"/>
    <rect x="-5" y="0" width="10" height="40"/>
    <rect x="-30" y="0" width="60" height="5" rx="2"/>
    <circle cx="5" cy="45" r="8"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="200" cy="650" r="150" fill="rgba(253,203,0,0.04)" stroke="rgba(253,203,0,0.08)" stroke-width="1"/>
  <circle cx="200" cy="650" r="100" fill="none" stroke="rgba(253,203,0,0.06)" stroke-width="1"/>
  <circle cx="1700" cy="150" r="80" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Text hint area indicator -->
  <text x="960" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.15)" letter-spacing="3">
    PLACEHOLDER — GERÇEK FOTOĞRAF İLE DEĞİŞTİRİN
  </text>
</svg>
